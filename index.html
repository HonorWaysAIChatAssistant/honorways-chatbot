<!DOCTYPE html>
<html>
<head>
  <title>Honorways AI Chat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #e3f2fd, #f5f5f5);
      margin: 0;
      padding: 0;
    }

    #chat {
      max-width: 700px;
      width: 95%;
      margin: 10px auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f9fbff;
    }

    .msg {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 75%;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #e4e6eb;
      color: black;
      margin-right: auto;
      text-align: left;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: #ffffff;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 6px;
      background: #fafafa;
      border-top: 1px solid #eee;
    }

    /* Mobile optimization */
    @media (max-width: 600px) {
      #chat {
        margin: 0;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

<div id="chat">

  <div class="header">
    Honorways AI Assistant
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
  </div>

  <div class="footer">
    Powered by HonorWays
  </div>

</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  input.value = "";

  const messages = document.getElementById("messages");

  messages.innerHTML += `<div class="msg user">${text}</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch("https://hook.us2.make.com/2gor8kpwlm6gtpmelge4x8xetfzel0iq", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text})
    });

    const data = await res.json();

    messages.innerHTML += `<div class="msg bot">${data.reply}</div>`;
    messages.scrollTop = messages.scrollHeight;

  } catch (error) {
    messages.innerHTML += `<div class="msg bot">Error connecting to AI.</div>`;
  }
}
</script>

</body>
</html>
