<!DOCTYPE html>
<html>
<head>
  <title>Honorways AI Chat</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    #chat { max-width: 500px; margin: auto; background:white; padding:20px; border-radius:10px; }
    .msg { margin: 10px 0; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>

<div id="chat">
  <h2>Honorways AI Assistant</h2>
  <div id="messages"></div>
  <input type="text" id="input" placeholder="Type your message..." style="width:80%">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";

  const messages = document.getElementById("messages");

  messages.innerHTML += `<div class="msg user"><b>You:</b> ${text}</div>`;

  const res = await fetch("YOUR_WEBHOOK_URL_HERE", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  const data = await res.json();

  messages.innerHTML += `<div class="msg bot"><b>Bot:</b> ${data.reply}</div>`;
}
</script>

</body>
</html>
