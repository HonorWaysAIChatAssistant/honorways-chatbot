<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honorways AI Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 95%;
      max-width: 900px;
      height: 92vh;
      background: #dfe1e5;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .chat-header {
      background: #0b5ed7;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 78%;
      padding: 16px 20px;
      border-radius: 22px;
      line-height: 1.4;
      font-size: 18px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #1f6fe5;
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bot {
      align-self: flex-start;
      background: #d3d4d8;
      color: black;
      border-bottom-left-radius: 8px;
    }

    .input-area {
      display: flex;
      padding: 14px;
      background: #dfe1e5;
      gap: 12px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    input {
      flex: 1;
      padding: 18px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      outline: none;
    }

    button {
      padding: 16px 28px;
      border: none;
      border-radius: 30px;
      background: #1f6fe5;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .typing {
      opacity: 0.7;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .chat-container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
      }

      .message {
        max-width: 88%;
        font-size: 17px;
      }

      .chat-header {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">Honorways AI Assistant(Demo)</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message..."
        onkeypress="handleKeyPress(event)"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // 🔧 REPLACE WITH YOUR MAKE WEBHOOK URL
    const WEBHOOK_URL = "https://hook.us2.make.com/2gor8kpwlm6gtpmelge4x8xetfzel0iq";

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function addMessage(text, sender, isTyping = false) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);

      if (isTyping) {
        msg.classList.add("typing");
      }

      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;

      return msg;
    }

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }

    async function sendMessage() {
      const message = userInput.value.trim();

      if (!message) return;

      console.log("SEND FUNCTION TRIGGERED");
      addMessage(message, "user");
      userInput.value = "";

      const typingBubble = addMessage("Typing...", "bot", true);

      try {
        console.log("Sending to webhook:", message);

        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const rawText = await response.text();
        console.log("RAW RESPONSE:", rawText);

        let reply = "";

        try {
          const data = JSON.parse(rawText);
          console.log("PARSED DATA:", data);

          reply =
            data.reply ||
            data.result ||
            data.response ||
            "No reply received from AI.";
        } catch (jsonError) {
          console.log("JSON parse failed, using raw text.");
          reply = rawText || "Error connecting to AI.";
        }

        typingBubble.remove();
        addMessage(reply, "bot");

      } catch (error) {
        console.error("FETCH ERROR:", error);
        typingBubble.remove();
        addMessage("Error connecting to AI.", "bot");
      }
    }

    // Optional welcome message
    window.onload = () => {
      addMessage("Hallo, ik ben de AI assistent voor JobethSalon en LoveFaithHope Apartements,😊 Hoe kan ik je vandaag helpen?", "bot");
    };
  </script>

</body>
</html>
