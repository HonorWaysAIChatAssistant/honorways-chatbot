<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Honorways AI Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .header {
      background: #1f5ed6;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 15px;
      max-width: 75%;
    }

    .user {
      background: #1f5ed6;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e5e5e5;
      color: black;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      background: #1f5ed6;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">Honorways AI Assistant</div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

const webhookUrl = "https://hook.us2.make.com/2gor8kpwlm6gtpmelge4x8xetfzel0iq";

function addMessage(text, sender) {
  const chatBox = document.getElementById("chatBox");

  const message = document.createElement("div");
  message.classList.add("message", sender);
  message.textContent = text;

  chatBox.appendChild(message);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  console.log("SEND FUNCTION TRIGGERED");

  const input = document.getElementById("userInput");
  const userText = input.value.trim();

  if (!userText) return;

  addMessage(userText, "user");
  input.value = "";

  console.log("Sending to webhook:", userText);

  fetch(webhookUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: userText })
  })
  .then(response => {
    console.log("RAW RESPONSE:", response);
    return response.json();
  })
  .then(data => {
    console.log("PARSED DATA:", data);

    if (data && data.reply) {
      addMessage(data.reply, "bot");
    } else {
      addMessage("No reply received from AI.", "bot");
    }
  })
  .catch(error => {
    console.error("ERROR:", error);
    addMessage("Error connecting to AI.", "bot");
  });
}

</script>

</body>
</html>
