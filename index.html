<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honorways AI Assistant</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat container */
.chat-container {
    width: 100%;
    max-width: 600px;
    height: 90vh;
    background: white;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1e73e8, #0052cc);
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

/* Messages area */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f5f7fa;
}

/* Message bubbles */
.msg {
    max-width: 75%;
    padding: 12px;
    border-radius: 18px;
    margin-bottom: 10px;
    word-wrap: break-word;
}

/* User */
.user {
    background: #1e73e8;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 5px;
}

/* Bot */
.bot {
    background: #e4e6eb;
    color: black;
    margin-right: auto;
    border-bottom-left-radius: 5px;
}

/* Input area */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

/* Button */
button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    background: #1e73e8;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0052cc;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    padding: 5px;
    color: #888;
}
</style>

</head>
<body>

<div class="chat-container">

    <div class="header">
        Honorways AI Assistant
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="input" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="footer">
        Powered by HonorWays
    </div>

</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* ENTER KEY SUPPORT */
input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

/* SEND MESSAGE FUNCTION */
async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    /* Show user message */
    messages.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    try {
        const res = await fetch("https://hook.us2.make.com/2gor8kpwlm6gtpmelge4x8xetfzel0iq", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        const data = await res.json();

        /* Show bot response */
        messages.innerHTML += `<div class="msg bot">${data.reply}</div>`;
        messages.scrollTop = messages.scrollHeight;

    } catch (error) {
        messages.innerHTML += `<div class="msg bot">Error connecting to AI.</div>`;
    }
}
</script>

</body>
</html>
